__use_yte__: true
__definitions__:
  - from pathlib import Path

# This SLURM snakemake profile is for running snakemake
# on a HPC cluster with SLURM as scheduler.

# TODO-copier-package update configuration for SLURM

# Hardware configuration
cores: 4

# Conda configuration
software-deployment-method: conda
use-conda: true

# Configuration files
configfile:
  - "config/config.yaml"
  # Load the local configuration file if it exists
  - ?("config/config.local.yaml" if Path("config/config.local.yaml").is_file() else SKIP)
  # TODO-copier-etl add SLURM config files
