# .ansible-lint.yml  (put at repo root)
profile: min            # disables the big playbook rule-set
enable_list: [yaml]     # run only the YAML rule
exclude_paths:
  - able-workflow/
  - docs/docs/_submodules/
skip_list:
  - yaml[line-length]   # example: maybe you don’t want 80-column wrapping
  - yaml[truthy]        # Copier often needs on/off strings
